<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSIRIS.EXE // Pale Horse Motion Comic</title>
  <style>
    :root {
      --green: #41ff7a;
      --green-dim: #1f9f55;
      --amber: #d99b45;
      --paper: #d7b574;
      --red: #ff3b30;
      --black: #020403;
      --panel: #070b09;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: var(--green);
      font-family: "Courier New", ui-monospace, monospace;
    }

    button {
      font: inherit;
      color: inherit;
      background: rgba(2, 8, 5, .82);
      border: 1px solid rgba(65, 255, 122, .55);
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      border-color: var(--amber);
      color: var(--amber);
      outline: none;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 50% 45%, rgba(32, 128, 72, .18), transparent 32%),
        linear-gradient(180deg, #030503, #000 52%, #050000);
      isolation: isolate;
      animation: powerOn 1s ease-in-out forwards;
    }

    #app::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      background:
        repeating-linear-gradient(to bottom, rgba(255,255,255,.06) 0, rgba(255,255,255,.06) 1px, transparent 1px, transparent 4px),
        radial-gradient(ellipse at center, transparent 42%, rgba(0,0,0,.82) 100%);
      mix-blend-mode: overlay;
      opacity: .75;
    }

    #app::after {
      content: "";
      position: absolute;
      inset: -30%;
      z-index: 21;
      pointer-events: none;
      opacity: .13;
      background-image:
        linear-gradient(115deg, transparent 0 47%, rgba(65,255,122,.14) 48% 50%, transparent 51% 100%),
        repeating-radial-gradient(circle at 35% 45%, rgba(255,255,255,.25) 0 1px, transparent 1px 5px);
      animation: noise 1.7s steps(2) infinite;
    }

    .scene {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      transform: scale(1.02);
      transition: opacity .5s ease, transform .5s ease;
      z-index: 1;
    }

    .scene.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
      z-index: 2;
    }

    .frame {
      position: relative;
      width: min(92vw, calc(92vh * var(--ratio)));
      height: min(92vh, calc(92vw / var(--ratio)));
      background: var(--panel);
      overflow: hidden;
      border: 1px solid rgba(217,155,69,.42);
      box-shadow:
        0 0 0 2px rgba(0,0,0,.9),
        0 0 34px rgba(65,255,122,.18),
        0 20px 80px rgba(0,0,0,.9);
    }

    .scene.red .frame {
      border-color: rgba(255,59,48,.58);
      box-shadow:
        0 0 0 2px rgba(0,0,0,.95),
        0 0 36px rgba(255,59,48,.28),
        0 20px 80px rgba(0,0,0,.92);
    }

    .art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: contrast(1.07) saturate(.95) brightness(.9);
      transform: scale(var(--start-scale, 1.08)) translate3d(var(--start-x, 0), var(--start-y, 0), 0);
      transform-origin: var(--origin, center center);
      animation: drift var(--duration, 8s) ease-in-out infinite alternate;
      animation-play-state: paused;
    }

    /* Only the visible panel animates — keeps 160+ images cheap. */
    .scene.active .art {
      animation-play-state: running;
    }

    .fit-contain .art {
      object-fit: contain;
      background: #030303;
    }

    .light {
      position: absolute;
      width: 28%;
      aspect-ratio: 1;
      border-radius: 50%;
      left: var(--x, 50%);
      top: var(--y, 50%);
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(77,255,129,.52), rgba(77,255,129,.16) 26%, transparent 70%);
      mix-blend-mode: screen;
      opacity: .72;
      animation: pulse 2.3s ease-in-out infinite;
    }

    .scene.red .light {
      background: radial-gradient(circle, rgba(255,59,48,.58), rgba(255,128,42,.18) 28%, transparent 72%);
    }

    .hud {
      position: absolute;
      left: clamp(12px, 2vw, 24px);
      top: clamp(12px, 2vw, 24px);
      max-width: min(430px, 56%);
      padding: 10px 12px;
      color: var(--green);
      background: rgba(0, 10, 5, .66);
      border: 1px solid rgba(65,255,122,.45);
      text-transform: uppercase;
      letter-spacing: 0;
      font-size: clamp(11px, 1.55vw, 18px);
      line-height: 1.3;
      text-shadow: 0 0 12px rgba(65,255,122,.6);
    }

    .scene.red .hud {
      color: var(--red);
      border-color: rgba(255,59,48,.55);
      text-shadow: 0 0 14px rgba(255,59,48,.68);
    }

    .caption {
      position: absolute;
      left: clamp(14px, 3vw, 44px);
      right: clamp(14px, 3vw, 44px);
      bottom: clamp(72px, 11vh, 118px);
      display: grid;
      gap: 8px;
      max-width: 780px;
      padding: clamp(12px, 2vw, 20px);
      background: rgba(3, 9, 5, .82);
      border: 1px solid rgba(65,255,122,.48);
      box-shadow: 0 0 24px rgba(0,0,0,.7);
    }

    .scene.red .caption {
      border-color: rgba(255,59,48,.62);
      background: rgba(16, 3, 3, .84);
    }

    .caption strong {
      color: var(--amber);
      font-size: clamp(13px, 1.6vw, 20px);
      line-height: 1.15;
      text-transform: uppercase;
    }

    .caption span {
      color: #c9ffd5;
      font-size: clamp(12px, 1.6vw, 18px);
      line-height: 1.4;
    }

    .caption em {
      color: var(--paper);
      font-style: normal;
    }

    .terminal {
      position: absolute;
      right: clamp(12px, 2vw, 24px);
      top: clamp(12px, 2vw, 24px);
      width: min(330px, 36%);
      padding: 10px 12px;
      color: var(--red);
      background: rgba(15, 0, 0, .76);
      border: 1px solid rgba(255,59,48,.56);
      font-size: clamp(10px, 1.25vw, 16px);
      line-height: 1.35;
      text-transform: uppercase;
      text-shadow: 0 0 13px rgba(255,59,48,.72);
    }

    .terminal.green {
      color: var(--green);
      background: rgba(0, 12, 6, .72);
      border-color: rgba(65,255,122,.45);
      text-shadow: 0 0 13px rgba(65,255,122,.65);
    }

    .controls {
      position: absolute;
      z-index: 30;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: rgba(0,0,0,.72);
      border: 1px solid rgba(65,255,122,.28);
    }

    .controls button {
      width: 42px;
      height: 38px;
      display: grid;
      place-items: center;
      font-size: 18px;
    }

    .counter {
      min-width: 86px;
      text-align: center;
      color: var(--paper);
      font-size: 13px;
    }

    #views {
      position: absolute;
      z-index: 40;
      top: 10px;
      right: 10px;
      padding: 4px 8px;
      color: var(--green);
      background: rgba(0, 10, 5, .6);
      border: 1px solid rgba(65,255,122,.4);
      font-size: 12px;
      letter-spacing: .04em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(65,255,122,.6);
      pointer-events: none;
      user-select: none;
    }

    /* TEMP editing aid — panel id tag. Toggle with the "i" key.
       Remove this block (and #tag markup + JS) before shipping. */
    #tag {
      position: absolute;
      z-index: 45;
      left: 50%;
      top: 8px;
      transform: translateX(-50%);
      padding: 5px 12px;
      text-align: center;
      color: #fff3c0;
      background: rgba(0, 0, 0, .82);
      border: 1px solid var(--amber);
      font-size: 13px;
      letter-spacing: .04em;
      box-shadow: 0 0 16px rgba(217,155,69,.4);
      pointer-events: none;
      user-select: text;
      white-space: nowrap;
    }

    #tag.hidden { display: none; }

    #tag b { color: var(--amber); font-size: 15px; }

    .progress {
      position: absolute;
      z-index: 29;
      left: 0;
      bottom: 0;
      height: 3px;
      width: 100%;
      background: rgba(255,255,255,.08);
    }

    .progress span {
      display: block;
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--amber), var(--red));
    }

    /* Slow rolling scanline band + brightness flicker — sits above the
       static scanlines (::before) and noise (::after) for a live CRT feel. */
    .crt {
      position: absolute;
      inset: 0;
      z-index: 22;
      pointer-events: none;
      mix-blend-mode: screen;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(65,255,122,.05) 47%,
        rgba(65,255,122,.13) 50%,
        rgba(65,255,122,.05) 53%,
        transparent 100%
      );
      background-size: 100% 240%;
      opacity: .5;
      animation: crtRoll 7.5s linear infinite, crtFlicker 5.5s steps(40) infinite;
    }

    .glitch {
      position: absolute;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      opacity: 0;
      mix-blend-mode: screen;
      background:
        linear-gradient(90deg, transparent 0 12%, rgba(255,59,48,.35) 12% 13%, transparent 13% 54%, rgba(65,255,122,.28) 54% 55%, transparent 55%),
        repeating-linear-gradient(to bottom, transparent 0 18px, rgba(255,255,255,.08) 18px 20px);
    }

    .glitch.hit {
      animation: glitch .42s steps(2);
    }

    .title-card {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 7vw;
      text-align: center;
      background: radial-gradient(circle, rgba(65,255,122,.16), transparent 38%), #000;
    }

    .title-card h1 {
      margin: 0;
      color: #e7ffe9;
      font-size: clamp(36px, 8vw, 118px);
      line-height: .88;
      text-shadow: 0 0 28px rgba(65,255,122,.45);
    }

    .title-card p {
      max-width: 800px;
      margin: 22px auto 0;
      color: var(--paper);
      font-size: clamp(14px, 2vw, 24px);
      line-height: 1.35;
    }

    @media (max-width: 760px) {
      .frame {
        width: 100vw;
        height: 100vh;
        border: 0;
      }

      .hud,
      .terminal {
        max-width: calc(100vw - 24px);
        width: auto;
        font-size: 11px;
      }

      .terminal {
        left: 12px;
        right: auto;
        top: auto;
        bottom: 134px;
      }

      .caption {
        left: 12px;
        right: 12px;
        bottom: 70px;
        padding: 12px;
      }
    }

    @keyframes drift {
      from { transform: scale(var(--start-scale, 1.08)) translate3d(var(--start-x, 0), var(--start-y, 0), 0); }
      to { transform: scale(var(--end-scale, 1.18)) translate3d(var(--end-x, 0), var(--end-y, 0), 0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: .45; transform: translate(-50%, -50%) scale(.9); }
      50% { opacity: .92; transform: translate(-50%, -50%) scale(1.18); }
    }

    @keyframes glitch {
      0% { opacity: 0; transform: translate(0, 0); }
      18% { opacity: .9; transform: translate(-10px, 5px); }
      36% { opacity: .35; transform: translate(8px, -4px); }
      60% { opacity: .8; transform: translate(-4px, 2px); }
      100% { opacity: 0; transform: translate(0, 0); }
    }

    @keyframes crtRoll {
      from { background-position: 0 -120%; }
      to { background-position: 0 120%; }
    }

    @keyframes crtFlicker {
      0%, 100% { opacity: .42; }
      50% { opacity: .55; }
      92% { opacity: .36; }
    }

    @keyframes noise {
      0% { transform: translate3d(-2%, -1%, 0); }
      100% { transform: translate3d(2%, 1%, 0); }
    }

    @keyframes powerOn {
      0% { opacity: 0; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Respect users who ask the OS to minimize motion: hold each panel
       still, keep the look, drop the drift / flicker / noise / glitch. */
    @media (prefers-reduced-motion: reduce) {
      #app { animation: none; }
      #app::after,
      .crt,
      .light { animation: none; }
      .art {
        animation: none;
        transform: scale(1.04);
      }
      .scene { transition: opacity .3s ease; transform: none; }
      .glitch.hit { animation: none; }
    }
  </style>
</head>

    function buildScene(beat) {
      const scene = document.createElement("section");
      scene.className = `scene ${beat.mode === "red" ? "red" : ""}`;
      scene.dataset.duration = beat.duration;
      scene.dataset.src = beat.src;
      const motion = beat.motion || ["1.08", "0", "0", "1.18", "0", "0"];
      scene.innerHTML = `
        <div class="frame ${beat.contain ? "fit-contain" : ""}" style="--ratio:${beat.ratio}">
          <img class="art" src="${beat.src}" alt="" decoding="async" style="--duration:${Math.max(beat.duration / 1000, 6)}s; --start-scale:${motion[0]}; --start-x:${motion[1]}; --start-y:${motion[2]}; --end-scale:${motion[3]}; --end-x:${motion[4]}; --end-y:${motion[5]}">
          ${beat.light ? `<div class="light" style="--x:${beat.light[0]}; --y:${beat.light[1]}"></div>` : ""}
          ${beat.hud ? `<div class="hud">${beat.hud.replace(/\\n/g, "<br>")}</div>` : ""}
          ${beat.terminal ? `<div class="terminal ${beat.mode === "green" ? "green" : ""}">${beat.terminal.replace(/\\n/g, "<br>")}</div>` : ""}
          ${(beat.title || beat.text) ? `<div class="caption"><strong>${beat.title || ""}</strong><span>${beat.text || ""}</span></div>` : ""}
        </div>
      `;
      return scene;
    }

    // Virtual window: only keep 3 scenes in the DOM at a time.
    const mounted = new Map(); // index → DOM element

    function mount(index) {
      if (mounted.has(index)) return mounted.get(index);
      const el = buildScene(beats[index]);
      app.appendChild(el);
      mounted.set(index, el);
      return el;
    }

    function unmount(index) {
      const el = mounted.get(index);
      if (el) { el.remove(); mounted.delete(index); }
    }

    function show(index, burst = true) {
      const total = beats.length;
      current = (index + total) % total;

      // Evict scenes outside the ±2 window to free memory.
      for (const [i] of mounted) {
        if (Math.abs(i - current) > 2 && !(i === 0 && current > total - 3)) {
          unmount(i);
        }
      }

      // Mount current + neighbours.
      const prevEl = mount((current - 1 + total) % total);
      const curEl  = mount(current);
      const nextEl = mount((current + 1) % total);

      mounted.forEach((el, i) => el.classList.toggle("active", i === current));

      counter.textContent = `${String(current + 1).padStart(2, "0")} / ${String(total).padStart(2, "0")}`;
      const src = beats[current].src;
      tag.innerHTML = `<b>#${String(current + 1).padStart(2, "0")}</b> &nbsp; ${src ? src.replace("assets/", "") : "— intro title card —"}`;
      started = performance.now();
      bar.style.width = "0%";
      window.clearTimeout(timer);
      if (burst) {
        glitch.classList.remove("hit");
        void glitch.offsetWidth;
        glitch.classList.add("hit");
      }
      queue();
    }

    function queue() {
      window.clearTimeout(timer);
      if (!playing) return;
      const duration = Number(scenes[current].dataset.duration || 6500);
      timer = window.setTimeout(() => show(current + 1), duration);
    }

    function tick(now) {
      if (playing) {
        const duration = Number(scenes[current].dataset.duration || 6500);
        bar.style.width = `${Math.min(100, ((now - started) / duration) * 100)}%`;
      }
      requestAnimationFrame(tick);
    }

    document.getElementById("next").addEventListener("click", () => show(current + 1));

      playing = !playing;
      playButton.textContent = playing ? "Ⅱ" : "▶";
      playButton.setAttribute("aria-label", playing ? "Pause" : "Play");

      queue();
    });
